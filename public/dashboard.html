<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Designs | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--bg-card);
            padding: 2rem;
            border-right: 1px solid var(--border);
        }

        .sidebar a {
            display: block;
            padding: 10px;
            color: var(--text);
            text-decoration: none;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: var(--border);
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-Pending {
            background: #f59e0b;
            color: white;
        }

        .status-InProgress {
            background: #3b82f6;
            color: white;
        }

        .status-Completed {
            background: #10b981;
            color: white;
        }
    </style>
</head>

<body class="bg-alt">

    <div class="dashboard-container">
        <div class="sidebar">
            <a href="index.html" class="logo" style="margin-bottom: 20px;"><img src="logo.svg" alt="Dev Designs Logo"
                    style="height:35px; vertical-align:middle; margin-right:8px;">Dev Designs</a>
            <br>
            <div id="user-menu" style="display: none;">
                <a href="#new-request" onclick="showSection('new-request')">➕ New Request</a>
                <a href="#my-projects" onclick="showSection('my-projects'); loadUserProjects();">📁 My Projects</a>
            </div>
            <div id="admin-menu" style="display: none;">
                <a href="#all-requests" onclick="showSection('all-requests'); loadAdminProjects();">🛠 Manage Requests</a>
            </div>
            <hr style="border-color: var(--border); margin: 20px 0;">
            <button class="btn-icon" id="theme-toggle" title="Toggle Theme">🌙</button>
            <br><br>
            <button class="btn-primary w-100" style="background: #ef4444;" onclick="logout()">Log Out</button>
        </div>

        <div class="main-content">
            <h2 id="welcome-msg" style="text-align: center;">Welcome, User!</h2>

            <!-- User: Make a request -->
            <section id="new-request" class="dash-section" style="display:none; max-width: 600px; margin: 0 auto;">
                <form id="project-form" onsubmit="submitProject(event)" class="card text-left mt-2">
                    <div class="form-group"><label>Name</label><input type="text" id="req-name" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="req-email" required></div>
                    <div class="form-group">
                        <label>Country & Phone Number</label>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="req-country-name" list="country-names-list" placeholder="Country" required style="width: 35%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text);" oninput="autoUpdateCountryCode()">
                            <datalist id="country-names-list"></datalist>
                            
                            <input type="text" id="req-country-code" style="width: 20%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text-muted); text-align:center; pointer-events:none;" readonly value="+91">
                            
                            <input type="tel" id="req-phone" pattern="[0-9]{10}" maxlength="10" title="Please enter exactly 10 digits" placeholder="10-digit number" required style="width:45%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text);">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Service Type</label>
                        <select id="req-service" required class="w-100">
                            <option value="Graphic Design">Graphic Design</option>
                            <option value="Video Editing">Video Editing</option>
                            <option value="Photo Editing">Photo Editing</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Project Description</label>
                        <textarea id="req-desc" rows="4" required class="w-100"></textarea>
                    </div>
                    <div class="form-group"><label>Deadline</label><input type="date" id="req-deadline" required></div>
                    <div class="form-group"><label>Upload Reference File</label><input type="file" id="req-file"></div>
                    <button type="submit" class="btn-primary">Submit Request</button>
                    <p id="req-msg" class="success-msg mt-2 text-center" style="display:none;">Request Submitted!</p>
                </form>
            </section>

            <!-- User: View Projects -->
            <section id="my-projects" class="dash-section" style="display:none; max-width: 900px; margin: 0 auto;">
                <h3 style="text-align: center;">My Project History</h3>
                <div class="grid-2 mt-2" id="user-projects-list">
                    <!-- Loaded dynamically -->
                </div>
            </section>

            <!-- Admin: Manage Requests -->
            <section id="all-requests" class="dash-section" style="display:none; max-width: 1000px; margin: 0 auto;">
                <h3 style="text-align: center;">Submitted Requests</h3>
                <div class="mt-2" id="admin-projects-list">
                    <!-- Loaded dynamically -->
                </div>
            </section>


        </div>
    </div>


    <!-- Modal overlay for Details/Edit -->
    <div id="details-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
        <div class="card" style="width:90%; max-width:600px; max-height:90vh; overflow-y:auto; position:relative; background:var(--bg-card); padding: 2.5rem; border: 1px solid var(--border);">
            <button onclick="closeDetailsModal()" style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:1.8rem; color:var(--text); cursor:pointer;">&times;</button>
            <h3 id="modal-title" style="color:var(--primary); margin-bottom:1.5rem; text-align:center;"></h3>
            <div id="modal-content" style="text-align:left; color:var(--text-muted); font-size:1rem; line-height:1.6;">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Init Dashboard logic on load
        document.addEventListener('DOMContentLoaded', () => {
            initDashboard();
        });

        // Country Auto-Complete Logic
        const dynamicCountryData = [
            { name: "Afghanistan", code: "+93" }, { name: "Albania", code: "+355" }, { name: "Algeria", code: "+213" },
            { name: "Andorra", code: "+376" }, { name: "Angola", code: "+244" }, { name: "Argentina", code: "+54" },
            { name: "Armenia", code: "+374" }, { name: "Australia", code: "+61" }, { name: "Austria", code: "+43" },
            { name: "Azerbaijan", code: "+994" }, { name: "Bahamas", code: "+1-242" }, { name: "Bahrain", code: "+973" },
            { name: "Bangladesh", code: "+880" }, { name: "Belarus", code: "+375" }, { name: "Belgium", code: "+32" },
            { name: "Brazil", code: "+55" }, { name: "Bulgaria", code: "+359" }, { name: "Cambodia", code: "+855" },
            { name: "Canada", code: "+1" }, { name: "Chile", code: "+56" }, { name: "China", code: "+86" },
            { name: "Colombia", code: "+57" }, { name: "Denmark", code: "+45" }, { name: "Egypt", code: "+20" },
            { name: "Finland", code: "+358" }, { name: "France", code: "+33" }, { name: "Germany", code: "+49" },
            { name: "Greece", code: "+30" }, { name: "Hong Kong", code: "+852" }, { name: "Hungary", code: "+36" },
            { name: "Iceland", code: "+354" }, { name: "India", code: "+91" }, { name: "Indonesia", code: "+62" },
            { name: "Iran", code: "+98" }, { name: "Iraq", code: "+964" }, { name: "Ireland", code: "+353" },
            { name: "Israel", code: "+972" }, { name: "Italy", code: "+39" }, { name: "Jamaica", code: "+1-876" },
            { name: "Japan", code: "+81" }, { name: "Jordan", code: "+962" }, { name: "Kuwait", code: "+965" },
            { name: "Malaysia", code: "+60" }, { name: "Mexico", code: "+52" }, { name: "Morocco", code: "+212" },
            { name: "Netherlands", code: "+31" }, { name: "New Zealand", code: "+64" }, { name: "Nigeria", code: "+234" },
            { name: "Norway", code: "+47" }, { name: "Pakistan", code: "+92" }, { name: "Philippines", code: "+63" },
            { name: "Poland", code: "+48" }, { name: "Portugal", code: "+351" }, { name: "Qatar", code: "+974" },
            { name: "Russia", code: "+7" }, { name: "Saudi Arabia", code: "+966" }, { name: "Singapore", code: "+65" },
            { name: "South Africa", code: "+27" }, { name: "South Korea", code: "+82" }, { name: "Spain", code: "+34" },
            { name: "Sri Lanka", code: "+94" }, { name: "Sweden", code: "+46" }, { name: "Switzerland", code: "+41" },
            { name: "Taiwan", code: "+886" }, { name: "Thailand", code: "+66" }, { name: "Turkey", code: "+90" },
            { name: "Ukraine", code: "+380" }, { name: "United Arab Emirates", code: "+971" },
            { name: "United Kingdom", code: "+44" }, { name: "United States", code: "+1" }, { name: "Vietnam", code: "+84" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('country-names-list');
            if (list) {
                dynamicCountryData.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.name;
                    list.appendChild(option);
                });
            }
        });

        function autoUpdateCountryCode() {
            const inputName = document.getElementById('req-country-name').value;
            const codeDisplay = document.getElementById('req-country-code');
            const matched = dynamicCountryData.find(c => c.name.toLowerCase() === inputName.toLowerCase());
            if (matched) {
                codeDisplay.value = matched.code;
            }
        }
    </script>
</body>
</html>
